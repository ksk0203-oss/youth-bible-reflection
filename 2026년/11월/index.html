<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>준비중 · Youth Bible Reflection</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;700;900&display=swap');
:root { --purple:#7C5CFF; --pink:#FF6B9D; --orange:#FFB648; --dark:#2D2A4A; --bg:#F7F5FF; --white:#FFFFFF; }
* { margin:0; padding:0; box-sizing:border-box; }
body { background: var(--bg); font-family:'Noto Sans KR',sans-serif; color:var(--dark); padding:24px 16px; }
.wrap { max-width:640px; margin:0 auto; }
.hero { background: linear-gradient(135deg, var(--purple), var(--pink) 60%, var(--orange)); border-radius:28px; padding:36px 28px; margin-bottom:20px; }
.hero-badge { display:inline-block; background:rgba(255,255,255,0.25); color:var(--white); font-size:13px; font-weight:800; padding:6px 14px; border-radius:100px; margin-bottom:14px; }
.hero-title { font-size:28px; font-weight:900; color:var(--white); }
.soon-card { background:var(--white); border-radius:24px; padding:50px 28px; text-align:center; box-shadow:0 8px 24px rgba(124,92,255,0.1); }
.soon-icon { font-size:40px; margin-bottom:14px; }
.soon-text { font-size:15px; color:#8A87A6; line-height:1.7; }
.back-link { display:inline-block; margin-top:24px; font-size:14px; font-weight:800; color:var(--purple); text-decoration:none; }
</style>
</head>
<body>
<div class="wrap">
  <div class="hero">
    <div class="hero-badge">🔥 청소년 5분 말씀 묵상</div>
    <div class="hero-title">2026년 11월</div>
  </div>
  <div class="soon-card">
    <div class="soon-icon">🚧</div>
    <div class="soon-text">아직 준비중이에요!<br>조금만 기다려주세요 :)</div>
    <a class="back-link" href="../../index.html">&larr; 처음으로 돌아가기</a>
  </div>
</div>
</body>
</html>
