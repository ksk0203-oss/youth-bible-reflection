<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>2026년 8월 · Youth Bible Reflection</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700;800;900&display=swap');
:root {
  --purple: #7C5CFF; --pink: #FF6B9D; --orange: #FFB648; --yellow: #FFE45E;
  --mint: #4ECDC4; --dark: #2D2A4A; --bg: #F7F5FF; --white: #FFFFFF;
}
* { margin:0; padding:0; box-sizing:border-box; }
body { background: var(--bg); font-family: 'Noto Sans KR', sans-serif; color: var(--dark); padding: 24px 16px; }
.wrap { max-width: 640px; margin: 0 auto; }
.back-link { display:inline-block; margin-bottom: 16px; font-size: 14px; font-weight: 800; color: var(--purple); text-decoration: none; }
.hero {
  background: linear-gradient(135deg, var(--purple) 0%, var(--pink) 60%, var(--orange) 100%);
  border-radius: 28px; padding: 36px 28px; position: relative; overflow: hidden; margin-bottom: 20px;
}
.hero::before { content:''; position:absolute; top:-40px; right:-40px; width:160px; height:160px; border-radius:50%; background:rgba(255,255,255,0.15); }
.hero-badge { display:inline-block; background:rgba(255,255,255,0.25); color:var(--white); font-size:13px; font-weight:800; padding:6px 14px; border-radius:100px; margin-bottom:14px; position:relative; z-index:1; }
.hero-title { font-size: 32px; font-weight: 900; color: var(--white); line-height:1.25; margin-bottom:8px; position:relative; z-index:1; }
.hero-sub { font-size: 14px; color: rgba(255,255,255,0.85); font-weight:500; position:relative; z-index:1; }
.toc-card { background: var(--white); border-radius: 24px; padding: 8px; box-shadow: 0 8px 24px rgba(124,92,255,0.12); margin-bottom: 16px; }
.toc-item { display: flex; align-items: center; gap: 14px; padding: 16px 14px; border-radius: 18px; text-decoration:none; color:inherit; }
.toc-item.disabled { opacity: 0.45; }
.toc-num { flex: 0 0 44px; height: 44px; border-radius: 14px; background: linear-gradient(135deg, var(--purple), var(--pink)); color: var(--white); font-weight: 800; font-size: 15px; display: flex; align-items: center; justify-content: center; }
.toc-num.gray { background: #D8D5EE; }
.toc-info { flex: 1; }
.toc-ref { font-weight: 800; font-size: 14px; color: var(--dark); }
.toc-theme { font-size: 12.5px; color: #8A87A6; margin-top: 2px; }
.toc-go { width: 32px; height: 32px; border-radius: 50%; background: var(--yellow); display: flex; align-items: center; justify-content: center; font-size: 14px; font-weight: 900; color: var(--dark); flex-shrink:0; }
.footer-note { text-align: center; padding: 20px; font-size: 12px; color: #A8A5C4; }
</style>
</head>
<body>
<div class="wrap">
  <a class="back-link" href="../../index.html">&larr; 처음으로</a>

  <div class="hero">
    <div class="hero-badge">🔥 청소년 5분 말씀 묵상</div>
    <div class="hero-title">2026년 8월</div>
    <div class="hero-sub">로마서 파헤치기 · 1장부터 시작!</div>
  </div>

  <div class="toc-card">
    <a class="toc-item" href="day01.html">
      <div class="toc-num">01</div>
      <div class="toc-info"><div class="toc-ref">롬 1:1-7</div><div class="toc-theme">바울이 자기소개 하는 날</div></div>
      <div class="toc-go">&rsaquo;</div>
    </a>
    <div class="toc-item disabled">
      <div class="toc-num gray">02</div>
      <div class="toc-info"><div class="toc-ref">롬 1:8-15</div><div class="toc-theme">준비중이에요</div></div>
    </div>
  </div>

  <div class="footer-note">청소년부 · 로마서 파헤치기</div>
</div>
</body>
</html>
