<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>2026년 8월 · Youth Bible Reflection</title>

<link rel="manifest" href="../../manifest.json">
<meta name="theme-color" content="#7C5CFF">

<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="청소년 묵상">
<meta name="mobile-web-app-capable" content="yes">

<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700;800;900&display=swap');

:root {
  --fs-scale: 1;
  --purple: #7C5CFF; --pink: #FF6B9D; --orange: #FFB648; --yellow: #FFE45E;
  --mint: #4ECDC4; --dark: #2D2A4A; --bg: #F7F5FF; --white: #FFFFFF;
  --gray: #8A87A6; --border: #E8E6F5;
}
* { margin:0; padding:0; box-sizing:border-box; }
body {
  background: var(--bg); font-family: 'Noto Sans KR', sans-serif; color: var(--dark);
  padding: 20px 16px; padding-top: max(52px, env(safe-area-inset-top) + 12px);
  padding-bottom: max(20px, env(safe-area-inset-bottom));
}
.wrap { max-width: 640px; margin: 0 auto; }

/* 글씨 크기 조절 */
.fs-control { display:flex; align-items:center; justify-content:flex-end; gap:6px; margin-bottom:12px; }
.fs-label { font-size:12px; color: var(--gray); margin-right:4px; font-weight:700; }
.fs-btn {
  font-family: inherit; background: var(--white); border: 1px solid var(--border); border-radius: 10px;
  color: var(--gray); cursor: pointer; width: 30px; height: 30px;
  display: flex; align-items: center; justify-content: center; font-weight:700;
}
.fs-btn:nth-child(2) { font-size: 12px; }
.fs-btn:nth-child(3) { font-size: 15px; }
.fs-btn:nth-child(4) { font-size: 18px; }
.fs-btn:nth-child(5) { font-size: 21px; }
.fs-btn.fs-active { background: linear-gradient(135deg, var(--purple), var(--pink)); color: var(--white); border-color: transparent; }

/* 맨 위로 버튼 */
.scroll-top-btn {
  position: fixed; right: 18px; bottom: max(18px, env(safe-area-inset-bottom) + 10px);
  width: 46px; height: 46px; border-radius: 50%;
  background: linear-gradient(135deg, var(--purple), var(--pink)); color: var(--white);
  border: none; font-size: 18px; cursor: pointer;
  display: none; align-items: center; justify-content: center;
  box-shadow: 0 6px 16px rgba(124,92,255,0.35); z-index: 999;
  opacity: 0; transition: opacity 0.2s ease;
}
.scroll-top-btn.is-visible { display: flex; opacity: 1; }

/* 히어로 */
.hero {
  background: linear-gradient(135deg, var(--purple) 0%, var(--pink) 60%, var(--orange) 100%);
  border-radius: 28px; padding: 32px 26px; position: relative; overflow: hidden; margin-bottom: 16px;
}
.hero::before { content:''; position:absolute; top:-40px; right:-40px; width:160px; height:160px; border-radius:50%; background:rgba(255,255,255,0.15); }
.hero::after { content:''; position:absolute; bottom:-60px; left:-30px; width:140px; height:140px; border-radius:50%; background:rgba(255,255,255,0.1); }
.hero-inner { position:relative; z-index:1; }
.hero-badge {
  display:inline-block; background:rgba(255,255,255,0.25); color:var(--white);
  font-size: calc(12px * var(--fs-scale,1)); font-weight:800; padding:6px 14px; border-radius:100px; margin-bottom:12px;
  letter-spacing: 0.5px;
}
.hero-date { font-size: calc(14px * var(--fs-scale,1)); font-weight:800; color:rgba(255,255,255,0.9); letter-spacing:1px; margin-bottom:4px; }
.hero-title { font-size: calc(28px * var(--fs-scale,1)); font-weight:900; color:var(--white); margin-bottom:14px; }
.hero-verse {
  border-top: 1px solid rgba(255,255,255,0.25); padding-top: 16px; margin-top: 16px;
  font-size: calc(14px * var(--fs-scale,1)); line-height:1.6; color: rgba(255,255,255,0.92);
}
.hero-verse-ref { display:block; margin-top:6px; font-size: calc(11.5px * var(--fs-scale,1)); font-weight:800; color: var(--yellow); }

/* 목차 */
.badge-row { margin-bottom: 8px; }
.pill-badge {
  display:inline-flex; align-items:center; gap:6px;
  background: var(--dark); color: var(--white);
  font-size: calc(12.5px * var(--fs-scale,1)); font-weight:800; padding:8px 14px; border-radius:100px;
}
.toc-card { margin-bottom: 16px; }
.toc-item {
  display: flex; align-items: baseline; gap: 12px; padding: 12px 12px; border-radius: 14px;
  cursor:pointer; text-decoration:none; color:inherit; width:100%; text-align:left;
  background: var(--white); border:none; font-family:inherit;
  box-shadow: 0 6px 16px rgba(124,92,255,0.22);
  margin-bottom: 8px;
  transform: translateY(0);
  transition: transform 0.18s ease, box-shadow 0.18s ease;
}
.toc-item:hover {
  box-shadow: 0 12px 26px rgba(124,92,255,0.32);
  transform: translateY(-4px);
}
.toc-item.is-disabled { opacity: 0.55; cursor:default; box-shadow: 0 2px 8px rgba(124,92,255,0.08); }
.toc-item.is-disabled:hover { box-shadow: 0 2px 8px rgba(124,92,255,0.08); transform: translateY(0); }
.toc-date-num { font-weight: 800; color: var(--purple); flex: 0 0 78px; font-size: calc(13px * var(--fs-scale,1)); }
.toc-dow { font-size: 0.72em; font-weight:600; color: var(--gray); margin-left: 2px; }
.toc-ref { font-weight: 700; flex: 0 0 100px; font-size: calc(13px * var(--fs-scale,1)); color: var(--dark); }
.toc-theme-text { flex: 1; min-width: 0; font-size: calc(12.5px * var(--fs-scale,1)); font-weight: 500; color: var(--gray); }
.toc-tag {
  flex: 0 0 auto; font-size: calc(10px * var(--fs-scale,1)); font-weight: 800; color: var(--white);
  background: var(--purple); padding: 5px 10px; border-radius: 100px;
}
.toc-tag.soon { background: #D8D5EE; color: var(--gray); }
.toc-arrow { flex: 0 0 auto; color: var(--purple); font-size: calc(15px * var(--fs-scale,1)); font-weight:800; width: 10px; text-align: center; }

.footer-links { text-align:center; padding: 16px 0 8px; }
.footer-links a { color: var(--purple); font-weight:800; font-size:13px; text-decoration:none; }
.footer-note { text-align: center; padding: 12px; font-size: 12px; color: var(--gray); }

/* 날짜별 화면 */
#view-day { display:none; }
.back-link { display:inline-block; margin-bottom: 14px; font-size: calc(13px * var(--fs-scale,1)); font-weight: 800; color: var(--purple); text-decoration: none; background:none; border:none; cursor:pointer; font-family:inherit; padding:0; }

.day-card { background: var(--white); border-radius: 24px; padding: 26px 22px; box-shadow: 0 8px 24px rgba(124,92,255,0.1); }
.day-header-row { display:flex; align-items:center; gap:10px; margin-bottom: 6px; }
.day-num-chip {
  width:32px; height:32px; border-radius:11px; background: linear-gradient(135deg, var(--purple), var(--pink));
  color:var(--white); font-weight:800; font-size: calc(13px * var(--fs-scale,1)); display:flex; align-items:center; justify-content:center; flex-shrink:0;
}
.day-date-label { font-size: calc(12.5px * var(--fs-scale,1)); font-weight:800; color: var(--gray); letter-spacing:0.5px; }

/* 오디오 */
.audio-row { display:flex; align-items:center; justify-content:flex-end; gap:6px; margin: 10px 0 14px; }
.audio-play-btn {
  width: 26px; height: 26px; border-radius: 50%; background: linear-gradient(135deg, var(--purple), var(--pink));
  color: var(--white); border: none; cursor: pointer; display:flex; align-items:center; justify-content:center; font-size:10px;
}
.audio-status { font-size: calc(10.5px * var(--fs-scale,1)); font-weight:700; color: var(--gray); margin-right:2px; }
.audio-speed-group { display:flex; gap:3px; }
.speed-btn {
  font-family:inherit; font-size: calc(10px * var(--fs-scale,1)); font-weight:800; color: var(--gray);
  background: var(--bg); border: 1px solid var(--border); border-radius:100px; padding:3px 8px; cursor:pointer;
}
.speed-btn.is-active { background: var(--purple); color: var(--white); border-color: var(--purple); }

.day-title { font-size: calc(21px * var(--fs-scale,1)); font-weight: 900; color: var(--dark); margin-bottom: 16px; }

.scripture-box {
  background: linear-gradient(135deg, #F3F0FF, #FFF0F5);
  border-radius: 18px; padding: 20px; margin-bottom: 8px;
  font-size: calc(15px * var(--fs-scale,1)); line-height: 1.9; color: var(--dark); text-align: justify; word-break: keep-all;
}
.scripture-box .vnum { color: var(--purple); font-weight: 900; font-size: calc(11.5px * var(--fs-scale,1)); margin-right: 2px; }
.scripture-note { font-size: calc(11px * var(--fs-scale,1)); color: var(--gray); text-align:right; margin: 4px 2px 16px; }

.section-block { margin: 18px 0; }
.chip { display:inline-block; font-size: calc(12px * var(--fs-scale,1)); font-weight: 800; padding: 6px 12px; border-radius: 100px; color: var(--white); margin-bottom: 10px; }
.chip--med { background: var(--mint); }
.chip--app { background: var(--orange); }
.chip--pray { background: var(--pink); }
.section-text { font-size: calc(14.5px * var(--fs-scale,1)); line-height: 1.8; color: var(--dark); text-align: justify; word-break: keep-all; }

.nav-row { display:flex; justify-content: space-between; margin-top: 20px; padding-top: 14px; border-top: 1px dashed var(--border); font-size: calc(12.5px * var(--fs-scale,1)); font-weight: 800; color: var(--gray); }
.nav-row a { color: inherit; text-decoration:none; }

@media (max-width: 480px) {
  body { padding: 16px 12px; padding-top: max(48px, env(safe-area-inset-top) + 10px); }
  .hero { padding: 24px 18px; border-radius: 22px; }
  .hero-title { font-size: calc(23px * var(--fs-scale,1)); margin-bottom: 10px; }
  .hero-date { font-size: calc(12.5px * var(--fs-scale,1)); }
  .hero-badge { font-size: calc(11px * var(--fs-scale,1)); padding: 5px 12px; }
  .hero-verse { font-size: calc(13px * var(--fs-scale,1)); padding-top: 12px; margin-top: 12px; }
  .pill-badge { font-size: calc(11.5px * var(--fs-scale,1)); padding: 7px 12px; }
  .toc-card { padding: 0; }
  .toc-item { flex-wrap: wrap; row-gap: 6px; padding: 12px 12px; }
  .toc-date-num { order: 1; flex-basis: 74px; font-size: calc(12.5px * var(--fs-scale,1)); }
  .toc-ref { order: 2; flex-basis: 92px; font-size: calc(12.5px * var(--fs-scale,1)); }
  .toc-tag { order: 3; }
  .toc-arrow { order: 4; }
  .toc-theme-text {
    order: 5; flex: 1 1 100%; margin-top: 2px; padding-left: 86px;
    white-space: normal; word-break: keep-all; overflow-wrap: break-word; line-height: 1.4;
  }
  .day-card { padding: 20px 16px; border-radius: 20px; }
  .day-title { font-size: calc(18px * var(--fs-scale,1)); margin-bottom: 12px; }
  .day-num-chip { width: 28px; height: 28px; font-size: calc(12px * var(--fs-scale,1)); }
  .day-date-label { font-size: calc(11.5px * var(--fs-scale,1)); }
  .scripture-box { padding: 16px; font-size: calc(14px * var(--fs-scale,1)); }
  .section-text { font-size: calc(13.5px * var(--fs-scale,1)); }
  .fs-control { gap: 5px; }
  .fs-btn { width: 27px; height: 27px; }
  .scroll-top-btn { width: 42px; height: 42px; right: 14px; }
}
</style>
</head>
<body>

<div class="wrap">

  <div class="fs-control" id="fs-control">
    <span class="fs-label">글씨 크기</span>
    <button class="fs-btn" data-scale="0.9" onclick="setFontScale(0.9)">가</button>
    <button class="fs-btn fs-active" data-scale="1" onclick="setFontScale(1)">가</button>
    <button class="fs-btn" data-scale="1.15" onclick="setFontScale(1.15)">가</button>
    <button class="fs-btn" data-scale="1.3" onclick="setFontScale(1.3)">가</button>
  </div>

  <!-- ===== 표지 + 목차 ===== -->
  <div id="view-cover">
    <div class="hero">
      <div class="hero-inner">
        <div class="hero-badge">청소년 5분 말씀 묵상</div>
        <div class="hero-date">2026년 8월</div>
        <div class="hero-title">로마서 파헤치기</div>
        <div class="hero-verse">
          "주의 말씀은 내 발에 등이요 내 길에 빛이니이다"
          <span class="hero-verse-ref">— 시편 119:105</span>
        </div>
      </div>
    </div>

    <div class="badge-row"><span class="pill-badge">날짜를 눌러 그날의 묵상을 읽어보세요</span></div>

    <div class="toc-card"><ul style="list-style:none;" id="toc-list"></ul></div>

    <div class="footer-links"><a href="../../index.html">&larr; 처음으로 돌아가기</a></div>
    <div class="footer-note">청소년부 · 로마서 파헤치기</div>
  </div>

  <!-- ===== 날짜별 화면 ===== -->
  <div id="view-day">
    <button class="back-link" onclick="showCover()">&larr; 8월 목차로</button>

    <div class="day-card">
      <div class="day-header-row">
        <div class="day-num-chip" id="d-num">01</div>
        <div class="day-date-label" id="d-date">8월 1일 · 로마서 1:1-7</div>
      </div>

      <div class="audio-row">
        <button class="audio-play-btn" id="audio-play-btn" onclick="togglePlay()"><span id="audio-play-icon">▶</span></button>
        <div class="audio-status" id="audio-status">듣기</div>
        <div class="audio-speed-group">
          <button class="speed-btn is-active" data-rate="1" onclick="setRate(1)">1x</button>
          <button class="speed-btn" data-rate="1.25" onclick="setRate(1.25)">1.25x</button>
          <button class="speed-btn" data-rate="1.5" onclick="setRate(1.5)">1.5x</button>
        </div>
      </div>

      <div class="day-title" id="d-theme">바울이 자기소개 하는 날</div>
      <div id="d-body"></div>

      <div class="nav-row">
        <a onclick="showCover()">&larr; 목차로</a>
        <span id="d-nav-next">다음 (준비중)</span>
      </div>
    </div>
  </div>

</div>

<button class="scroll-top-btn" id="scroll-top-btn" onclick="scrollToTop()" aria-label="맨 위로"><span>↑</span></button>

<script>
const days = [
  {n:1, date:"08.01", ref:"1:1&ndash;7", theme:"바울이 자기소개 하는 날", ready:true,
    scripture:'<span class="vnum">1</span>예수 그리스도의 종 바울은 사도로 부르심을 받아 하나님의 복음을 위하여 택정함을 입었으니 <span class="vnum">2</span>이 복음은 하나님이 선지자들을 통하여 그의 아들에 관하여 성경에 미리 약속하신 것이라 <span class="vnum">3</span>그의 아들에 관하여 말하면 육신으로는 다윗의 혈통에서 나셨고 <span class="vnum">4</span>성결의 영으로는 죽은 자들 가운데서 부활하사 능력으로 하나님의 아들로 선포되셨으니 곧 우리 주 예수 그리스도시니라 <span class="vnum">5</span>그로 말미암아 우리가 은혜와 사도의 직분을 받아 그의 이름을 위하여 모든 이방인 중에서 믿어 순종하게 하나니 <span class="vnum">6</span>너희도 그들 중에서 예수 그리스도의 것으로 부르심을 받은 자니라 <span class="vnum">7</span>로마에서 하나님의 사랑하심을 받고 성도로 부르심을 받은 모든 자에게 하나님 우리 아버지와 주 예수 그리스도로부터 은혜와 평강이 있기를 원하노라',
    meditation:'바울은 편지 첫 줄에서 자기를 "예수님의 종"이라고 소개해요. 자기소개 할 때 보통 이름, 학교, 잘하는 것 이런 걸 먼저 말하잖아요? 그런데 바울은 그런 것들을 다 빼고 "나는 예수님 거예요"부터 말한 거예요. 그리고 예수님이 누구신지도 짧게 설명해요 — 다윗 가문에서 태어난 분이면서 동시에 부활을 통해 하나님의 아들로 증명되신 분이라고요. 바울에게는 이 소개가 세상에서 제일 중요한 정보였던 거죠.',
    application:'오늘 누가 나를 소개한다면 뭐라고 할까요? SNS 프로필이나 성적, 좋아하는 아이돌 말고, 진짜 나를 설명하는 한 문장을 오늘 한번 적어볼까요.',
    prayer:'하나님, 저도 바울처럼 제 정체성을 예수님 안에서 먼저 찾게 해주세요. 오늘 하루도 함께해 주세요. 예수님 이름으로 기도합니다. 아멘.',},
  {n:2, date:"08.02", ref:"1:8&ndash;15", theme:"만난 적도 없는데 왜 이렇게 챙길까", ready:true,
    scripture:'<span class="vnum">8</span>먼저 내가 예수 그리스도로 말미암아 너희 모든 사람에 관하여 내 하나님께 감사함은 너희 믿음이 온 세상에 전파됨이로다 <span class="vnum">9</span>내가 그의 아들의 복음 안에서 내 심령으로 섬기는 하나님이 나의 증인이 되시거니와 항상 내 기도에 쉬지 않고 너희를 말하며 <span class="vnum">10</span>어떻게 하든지 이제 하나님의 뜻 안에서 너희에게로 나아갈 좋은 길 얻기를 구하노라 <span class="vnum">11</span>내가 너희 보기를 간절히 원하는 것은 어떤 신령한 은사를 너희에게 나누어 주어 너희를 견고하게 하려 함이니 <span class="vnum">12</span>이는 곧 내가 너희 가운데서 너희와 나의 믿음으로 말미암아 피차 안위함을 얻으려 함이라 <span class="vnum">13</span>형제들아 내가 여러 번 너희에게 가고자 한 것을 너희가 모르기를 원하지 아니하노니 이는 너희 중에서도 다른 이방인 중에서와 같이 열매를 맺게 하려 함이로되 지금까지 길이 막혔도다 <span class="vnum">14</span>헬라인이나 야만인이나 지혜 있는 자나 어리석은 자에게 다 내가 빚진 자라 <span class="vnum">15</span>그러므로 나는 할 수 있는 대로 로마에 있는 너희에게도 복음 전하기를 원하노라',
    meditation:'바울은 한 번도 만난 적 없는 로마 사람들을 위해 계속 기도하고 있어요. 심지어 자기가 그들에게 "빚진 자"라고까지 말해요 — 좋은 것을 알면서 나만 갖고 있으면 안 된다는 거죠. 마치 좋은 웹툰이나 맛집을 발견하면 친구한테 바로 공유하고 싶은 마음이랑 비슷해요. 바울에게 복음은 그 정도로 나누고 싶은 좋은 소식이었던 거예요.',
    application:'내가 요즘 진짜 좋다고 느끼는 것(신앙이든 뭐든)을 아직 얘기 안 한 친구가 있나요? 오늘 한 명한테 살짝 얘기해볼까요.',
    prayer:'하나님, 저도 좋은 걸 저 혼자만 갖고 있지 않게 해주세요. 제 주변 사람들을 위해 기도하는 마음을 주세요. 예수님 이름으로 기도합니다. 아멘.',},
  {n:3, date:"08.03", ref:"1:16&ndash;17", theme:"부끄러워하지 않아도 돼요", ready:true,
    scripture:'<span class="vnum">16</span>내가 복음을 부끄러워하지 아니하노니 이 복음은 모든 믿는 자에게 구원을 주시는 하나님의 능력이 됨이라 먼저는 유대인에게요 그리고 헬라인에게로다 <span class="vnum">17</span>복음에는 하나님의 의가 나타나서 믿음으로 믿음에 이르게 하나니 기록된 바 오직 의인은 믿음으로 말미암아 살리라 함과 같으니라',
    meditation:'바울이 여기서 하는 말은 정말 담대해요 — "내가 복음을 부끄러워하지 아니하노니." 사실 예수님 믿는다고 말하면 가끔 좀 애매한 분위기가 될 때가 있잖아요. 그런데 바울은 그걸 숨기지 않겠다고 선언해요. 이유는 간단해요, 이 복음이 진짜 \'힘\'이 있다고 믿었기 때문이에요. 그리고 그 힘은 오직 하나예요 — 믿음. 조건 다는 것 없이, 그냥 믿으면 되는 거예요.',
    application:'신앙 얘기하는 게 어색했던 순간이 있었나요? 오늘은 조금 더 자연스럽게 얘기해보는 연습을 해볼까요.',
    prayer:'하나님, 제가 하나님 믿는 걸 부끄러워하지 않게 해주세요. 오직 믿음으로 산다는 게 뭔지 오늘 조금 더 깨닫게 해주세요. 예수님 이름으로 기도합니다. 아멘.',},
  {n:4, date:"08.04", ref:"1:18&ndash;25", theme:"몰랐다고 하기엔 너무 뻔하지 않나요", ready:true,
    scripture:'<span class="vnum">18</span>하나님의 진노가 불의로 진리를 막는 사람들의 모든 경건하지 않음과 불의에 대하여 하늘로부터 나타나나니 <span class="vnum">19</span>이는 하나님을 알 만한 것이 그들 속에 보임이라 하나님께서 이를 그들에게 보이셨느니라 <span class="vnum">20</span>창세로부터 그의 보이지 아니하는 것들 곧 그의 영원하신 능력과 신성이 그가 만드신 만물에 분명히 보여 알려졌나니 그러므로 그들이 핑계하지 못할지니라 <span class="vnum">21</span>하나님을 알되 하나님을 영화롭게도 아니하며 감사하지도 아니하고 오히려 그 생각이 허망하여지며 미련한 마음이 어두워졌나니 <span class="vnum">22</span>스스로 지혜 있다 하나 어리석게 되어 <span class="vnum">23</span>썩어지지 아니하는 하나님의 영광을 썩어질 사람과 새와 짐승과 기어다니는 동물 모양의 우상으로 바꾸었느니라 <span class="vnum">24</span>그러므로 하나님께서 그들을 마음의 정욕대로 더러움에 내버려 두사 그들의 몸을 서로 욕되게 하게 하셨으니 <span class="vnum">25</span>이는 그들이 하나님의 진리를 거짓 것으로 바꾸어 피조물을 조물주보다 더 경배하고 섬김이라 주는 곧 영원히 찬송할 이시로다 아멘',
    meditation:'바울은 하나님을 몰라서 문제인 게 아니라고 말해요. 하늘, 자연, 세상 자체가 이미 하나님이 계신다는 걸 보여주고 있다는 거예요 — 별이 총총한 밤하늘을 보면서 감탄하는 그 마음, 그게 힌트라는 거죠. 문제는 그걸 알면서도 무시하고 다른 것(돈, 인기, 외모 같은 것)을 최고로 떠받드는 거예요.',
    application:'내 삶에서 은근히 \'최고\'로 떠받들고 있는 게 뭔가요? 성적, 팔로워 수, 외모... 오늘 하나 골라서 정직하게 인정해볼까요.',
    prayer:'하나님, 제가 다른 것들을 하나님 자리에 올려놓지 않게 해주세요. 창조하신 것들을 볼 때마다 하나님을 기억하게 해주세요. 예수님 이름으로 기도합니다. 아멘.',},
  {n:5, date:"08.05", ref:"1:26&ndash;32", theme:"내버려두신다는 게 무슨 뜻일까요", ready:true,
    scripture:'<span class="vnum">26</span>이 때문에 하나님께서 그들을 부끄러운 욕심에 내버려 두셨으니 곧 그들의 여자들도 순리대로 쓸 것을 바꾸어 역리로 쓰며 <span class="vnum">27</span>그와 같이 남자들도 순리대로 여자 쓰기를 버리고 서로 향하여 음욕이 불 일듯 하매 남자가 남자와 더불어 부끄러운 일을 행하여 그들의 그릇됨에 상당한 보응을 그들 자신이 받았느니라 <span class="vnum">28</span>또한 그들이 마음에 하나님 두기를 싫어하매 하나님께서 그들을 그 상실한 마음대로 내버려 두사 합당하지 못한 일을 하게 하셨으니 <span class="vnum">29</span>곧 모든 불의, 추악, 탐욕, 악의가 가득한 자요 시기, 살인, 분쟁, 사기, 악독이 가득한 자요 수군수군하는 자요 <span class="vnum">30</span>비방하는 자요 하나님께서 미워하시는 자요 능욕하는 자요 교만한 자요 자랑하는 자요 악을 도모하는 자요 부모를 거역하는 자요 <span class="vnum">31</span>우매한 자요 배약하는 자요 무정한 자요 무자비한 자라 <span class="vnum">32</span>그들이 이같은 일을 행하는 자는 사형에 해당한다고 하나님께서 정하심을 알고도 자기들만 행할 뿐 아니라 또한 그런 일을 행하는 자들을 옳다 하느니라',
    meditation:'이 본문은 좀 무거운 죄 목록이 나와요 — 그런데 자세히 보면 그렇게 특별한 것들이 아니에요. 시기, 다툼, 뒷담화, 교만, 부모님 무시하기... 다 우리 일상에서 흔히 볼 수 있는 것들이에요. 바울의 포인트는 몇몇 나쁜 사람만 문제가 아니라, 하나님을 마음에서 밀어내면 누구나 이 목록 어딘가에 서게 된다는 거예요.',
    application:'이 목록 중에 요즘 내 안에서 제일 익숙한 게 뭔가요? 하나만 골라서 하나님께 솔직하게 말씀드려볼까요.',
    prayer:'하나님, 제 안의 뒷담화하고 싶은 마음, 교만한 마음을 용서해주세요. 하나님을 제 삶에 계속 모시고 싶어요. 예수님 이름으로 기도합니다. 아멘.',},
  {n:6, date:"08.06", ref:"2:1&ndash;5", theme:"남 욕하기 전에 나부터", ready:true,
    scripture:'<span class="vnum">1</span>그러므로 남을 판단하는 사람아, 누구를 막론하고 네가 핑계하지 못할 것은 남을 판단하는 것으로 네가 너를 정죄함이니 판단하는 네가 같은 일을 행함이니라 <span class="vnum">2</span>이런 일을 행하는 자에게 하나님의 심판이 진리대로 되는 줄 우리가 아노라 <span class="vnum">3</span>이런 일을 행하는 자를 판단하고도 같은 일을 행하는 사람아, 네가 하나님의 심판을 피할 줄로 생각하느냐 <span class="vnum">4</span>혹 네가 하나님의 인자하심이 너를 인도하여 회개하게 하심을 알지 못하여 그의 인자하심과 용납하심과 길이 참으심이 풍성함을 멸시하느냐 <span class="vnum">5</span>다만 네 고집과 회개하지 아니한 마음을 따라 진노의 날 곧 하나님의 의로우신 심판이 나타나는 그 날에 임할 진노를 네게 쌓는도다',
    meditation:'누군가를 판단하고 험담하는 것, 사실 되게 쉽죠? 그런데 바울은 그게 오히려 나 자신을 정죄하는 거라고 말해요 — 판단하는 사람도 결국 비슷한 일을 하기 때문이에요. 하나님이 우리를 참아주시는 이유는 벌주려는 게 아니라 우리가 돌이키길 바라시기 때문이에요.',
    application:'오늘 누군가를 뒷담화하고 싶은 마음이 들면, 그 전에 나는 어떤지 먼저 생각해볼까요.',
    prayer:'하나님, 남을 판단하기 전에 저 자신을 먼저 돌아보게 해주세요. 하나님의 참으심에 감사하며 오늘을 살게 해주세요. 예수님 이름으로 기도합니다. 아멘.',},
  {n:7, date:"08.07", ref:"2:6&ndash;11", theme:"공평하신 하나님", ready:true,
    scripture:'<span class="vnum">6</span>하나님께서 각 사람에게 그 행한 대로 보응하시되 <span class="vnum">7</span>참고 선을 행하여 영광과 존귀와 썩지 아니함을 구하는 자에게는 영생으로 하시고 <span class="vnum">8</span>오직 당을 지어 진리를 따르지 아니하고 불의를 따르는 자에게는 진노와 분노로 하시리라 <span class="vnum">9</span>악을 행하는 각 사람의 영에는 환난과 곤고가 있으리니 먼저는 유대인에게요 그리고 헬라인에게며 <span class="vnum">10</span>선을 행하는 각 사람에게는 영광과 존귀와 평강이 있으리니 먼저는 유대인에게요 그리고 헬라인에게라 <span class="vnum">11</span>이는 하나님께서 외모로 사람을 취하지 아니하심이라',
    meditation:'하나님의 심판은 \'누가 더 배경이 좋냐\'가 아니라 \'무엇을 행했냐\'로 결정돼요. 성실하게 선을 행하며 산 사람에게는 영생이, 진리를 외면한 사람에게는 심판이 있다는 거예요. 하나님은 외모나 배경으로 사람을 특별 대우하지 않으세요.',
    application:'내가 은근히 \'나는 예외\'라고 생각하는 부분이 있나요? 오늘은 그 착각을 내려놔볼까요.',
    prayer:'하나님, 공평하신 하나님 앞에서 저를 정직하게 세웁니다. 배경이나 조건이 아니라 삶으로 하나님을 기쁘시게 하고 싶어요. 예수님 이름으로 기도합니다. 아멘.',},
  {n:8, date:"08.08", ref:"2:12&ndash;16", theme:"규칙 몰라도 양심은 있잖아요", ready:true,
    scripture:'<span class="vnum">12</span>무릇 율법 없이 범죄한 자는 또한 율법 없이 망하고 무릇 율법이 있고 범죄한 자는 율법으로 말미암아 심판을 받으리라 <span class="vnum">13</span>하나님 앞에서는 율법을 듣는 자가 의인이 아니요 오직 율법을 행하는 자라야 의롭다 하심을 얻으리니 <span class="vnum">14</span>율법 없는 이방인이 본성으로 율법의 일을 행할 때에는 이 사람은 율법이 없어도 자기가 자기에게 율법이 되나니 <span class="vnum">15</span>이런 이들은 그 양심이 증거가 되어 그 생각들이 서로 혹은 고발하며 혹은 변명하여 그 마음에 새긴 율법의 행위를 나타내느니라 <span class="vnum">16</span>곧 나의 복음에 이른 바와 같이 하나님이 예수 그리스도로 말미암아 사람들의 은밀한 것을 심판하시는 그 날이라',
    meditation:'규칙을 배운 사람이든 안 배운 사람이든, 결국 \'아느냐\'가 아니라 \'행했냐\'가 기준이에요. 흥미로운 건, 규칙을 배우지 않은 사람도 마음속 양심이 옳고 그름을 어느 정도 알려준다는 거예요 — 이게 하나님이 사람 마음에 심어두신 흔적이에요.',
    application:'요즘 내 양심이 조용히 찔러오는 게 있나요? 오늘 그 소리를 무시하지 말고 들어볼까요.',
    prayer:'하나님, 제 안에 주신 양심의 소리를 외면하지 않게 해주세요. 아는 것에서 그치지 않고 행하는 사람이 되게 해주세요. 예수님 이름으로 기도합니다. 아멘.',
    note:'* 2:12-16 중 핵심 구절만 뽑았어요',},
  {n:9, date:"08.09", ref:"2:17&ndash;24", theme:"말과 행동이 다르면 티나요", ready:true,
    scripture:'<span class="vnum">17</span>유대인이라 불리는 네가 율법을 의지하며 하나님을 자랑하며 <span class="vnum">18</span>율법의 교훈을 받아 하나님의 뜻을 알고 지극히 선한 것을 분간하며 <span class="vnum">19</span>맹인의 길을 인도하는 자요 어둠에 있는 자의 빛이요 <span class="vnum">20</span>율법에 있는 지식과 진리의 모본을 가진 자로서 어리석은 자의 교사요 어린 아이의 선생이라고 스스로 믿으니 <span class="vnum">21</span>그러면 다른 사람을 가르치는 네가 네 자신은 가르치지 아니하느냐 도둑질하지 말라 선포하는 네가 도둑질하느냐 <span class="vnum">22</span>간음하지 말라 말하는 네가 간음하느냐 우상을 가증히 여기는 네가 신전 물건을 도둑질하느냐 <span class="vnum">23</span>율법을 자랑하는 네가 율법을 범함으로 하나님을 욕되게 하느냐 <span class="vnum">24</span>기록된 바와 같이 하나님의 이름이 너희 때문에 이방인 중에서 모독을 받는도다',
    meditation:'바울은 여기서 유대인들을 콕 집어 얘기해요 — 남을 가르치면서 정작 자기는 안 지키는 것, 완전 아이러니하죠? "도둑질하지 마라" 하면서 도둑질하고, "간음하지 마라" 하면서 간음하는 사람. 이런 이중성 때문에 오히려 하나님의 이름이 욕을 먹는다는 거예요. 아는 것과 사는 것 사이의 간격이 얼마나 위험한지 보여줘요.',
    application:'내가 알고 있는 것과 실제로 사는 모습 사이에 벌어진 틈이 있나요? 오늘 그 틈을 좁히는 작은 행동 하나를 해볼까요.',
    prayer:'하나님, 제가 아는 대로 살아내지 못해서 하나님 이름을 가리는 사람이 되지 않게 해주세요. 예수님 이름으로 기도합니다. 아멘.',},
  {n:10, date:"08.10", ref:"2:25&ndash;29", theme:"겉모습보다 마음", ready:true,
    scripture:'<span class="vnum">25</span>네가 율법을 행하면 할례가 유익하나 만일 율법을 범하면 네 할례는 무할례가 되느니라 <span class="vnum">26</span>그런즉 무할례자가 율법의 규례를 지키면 그 무할례를 할례와 같이 여길 것이 아니냐 <span class="vnum">27</span>또한 본래 무할례자가 율법을 온전히 지키면 율법 조문과 할례를 가지고 율법을 범하는 너를 정죄하지 아니하겠느냐 <span class="vnum">28</span>무릇 표면적 유대인이 유대인이 아니요 표면적 육신의 할례가 할례가 아니니라 <span class="vnum">29</span>오직 이면적 유대인이 유대인이며 할례는 마음에 할지니 영에 있고 율법 조문에 있지 아니한 것이라 그 칭찬이 사람에게서가 아니요 다만 하나님에게서니라',
    meditation:'할례(유대인의 표시)는 마음의 순종 없이는 의미가 없다고 바울은 말해요. 겉으로 보이는 신앙의 표시(교회 다니는 것, 기도하는 척하는 것)보다, 진짜 중요한 건 마음이라는 거예요. 사람에게 보이려는 신앙이 아니라 하나님과의 진짜 관계가 핵심이에요.',
    application:'내가 사람들 보라고 하는 신앙 행동이 있나요? 오늘은 아무도 안 볼 때 하나님과 진짜로 만나는 시간을 가져볼까요.',
    prayer:'하나님, 사람이 아니라 하나님이 보시는 마음을 신경 쓰게 해주세요. 겉모습이 아니라 진심으로 하나님을 만나고 싶어요. 예수님 이름으로 기도합니다. 아멘.',},
  {n:11, date:"08.11", ref:"3:1&ndash;8", theme:"내가 흔들려도 하나님은 안 흔들리세요", ready:true,
    scripture:'<span class="vnum">1</span>그런즉 유대인의 나음이 무엇이며 할례의 유익이 무엇이냐 <span class="vnum">2</span>범사에 많으니 우선은 그들이 하나님의 말씀을 맡았음이니라 <span class="vnum">3</span>어떤 자들이 믿지 아니하였으면 어찌하리요 그 믿지 아니함이 하나님의 미쁘심을 폐하겠느냐 <span class="vnum">4</span>그럴 수 없느니라 사람은 다 거짓되되 오직 하나님은 참되시다 할지어다 기록된 바 주께서 주의 말씀에 의롭다 함을 얻으시고 판단 받으실 때에 이기려 하심이라 함과 같으니라 <span class="vnum">5</span>그러나 우리 불의가 하나님의 의를 드러나게 하면 무슨 말 하리요 진노를 내리시는 하나님이 불의하시냐 <span class="vnum">6</span>결코 그렇지 아니하니라 만일 그러하면 하나님께서 어찌 세상을 심판하시리요 <span class="vnum">7</span>그러나 나의 거짓말로 하나님의 참되심이 더 풍성하여 그의 영광이 되었다면 어찌 내가 죄인처럼 심판을 받으리요 <span class="vnum">8</span>또는 그러면 선을 이루기 위하여 악을 행하자 하지 않겠느냐 어떤 이들이 이렇게 비방하여 우리가 이런 말을 한다고 하니 그들은 정죄 받는 것이 마땅하니라',
    meditation:'바울은 사람이 신실하지 않아도 하나님은 여전히 참되시다고 말해요. 정말 위로되는 말이지 않나요? 내가 오늘 실수하고 넘어져도, 하나님의 성품 자체는 절대 바뀌지 않는다는 거예요. 내 믿음의 크기가 아니라 하나님이 어떤 분이신지가 더 중요해요.',
    application:'요즘 내 믿음이 흔들린다고 느껴지나요? 오늘은 내 상태가 아니라 하나님이 어떤 분이신지에 집중해볼까요.',
    prayer:'하나님, 제가 흔들릴 때도 하나님은 변하지 않으신다는 걸 믿게 해주세요. 예수님 이름으로 기도합니다. 아멘.',},
  {n:12, date:"08.12", ref:"3:9&ndash;14", theme:"다 같이 문제 있어요", ready:true,
    scripture:'<span class="vnum">9</span>그러면 어떠하냐 우리는 나으냐 결코 아니라 유대인이나 헬라인이나 다 죄 아래에 있다고 우리가 이미 선언하였느니라 <span class="vnum">10</span>기록된 바 의인은 없나니 하나도 없으며 <span class="vnum">11</span>깨닫는 자도 없고 하나님을 찾는 자도 없고 <span class="vnum">12</span>다 치우쳐 함께 무익하게 되고 선을 행하는 자는 없나니 하나도 없도다 <span class="vnum">13</span>그들의 목구멍은 열린 무덤이요 그 혀로는 속임을 일삼으며 그 입술에는 독사의 독이 있고 <span class="vnum">14</span>그 입에는 저주와 악독이 가득하고',
    meditation:'바울이 구약 여러 구절을 모아서 던지는 이 말은 좀 세게 들려요 — "의인은 없나니 하나도 없으며." 즉, 누구도 스스로 완벽하다고 자부할 수 없다는 거예요. 특히 우리 입에서 나오는 말들(속임, 험담, 저주)이 얼마나 자주 문제가 되는지 콕 집어줘요.',
    application:'오늘 내 말버릇 중에 고치고 싶은 게 있나요? 말하기 전에 한 번 더 생각해보는 하루를 살아볼까요.',
    prayer:'하나님, 제 말과 입술을 다스려주세요. 저 스스로 의롭다 여기지 않고 하나님의 은혜만 의지하게 해주세요. 예수님 이름으로 기도합니다. 아멘.',},
  {n:13, date:"08.13", ref:"3:15&ndash;20", theme:"규칙 지킨다고 완벽해지는 건 아니에요", ready:true,
    scripture:'<span class="vnum">15</span>그 발은 피 흘리는 데 빠른지라 <span class="vnum">16</span>파멸과 고생이 그 길에 있어 <span class="vnum">17</span>평강의 길을 알지 못하였고 <span class="vnum">18</span>그들의 눈 앞에 하나님을 두려워함이 없느니라 함과 같으니라 <span class="vnum">19</span>우리가 알거니와 무릇 율법이 말하는 바는 율법 아래에 있는 자들에게 말하는 것이니 이는 모든 입을 막고 온 세상으로 하나님의 심판 아래에 있게 하려 함이라 <span class="vnum">20</span>그러므로 율법의 행위로 그의 앞에 의롭다 하심을 얻을 육체가 없나니 율법으로는 죄를 깨달음이니라',
    meditation:'규칙을 열심히 지킨다고 해서 그게 나를 완벽하게 만들어주는 건 아니에요. 오히려 규칙은 내가 완벽하지 않다는 걸 깨닫게 해주는 거울 같은 거예요. 시험 범위를 아무리 열심히 봐도 100점이 보장 안 되는 것처럼, 노력만으로는 완전해질 수 없어요.',
    application:'내가 \'이 정도면 괜찮은 사람\'이라고 스스로 점수 매기고 있지는 않나요? 오늘은 그 기준을 내려놔볼까요.',
    prayer:'하나님, 저는 제 힘으로 완벽해질 수 없는 사람이에요. 하나님의 은혜가 필요하다는 걸 인정하게 해주세요. 예수님 이름으로 기도합니다. 아멘.',},
  {n:14, date:"08.14", ref:"3:21&ndash;26", theme:"공짜로 받은 거예요", ready:true,
    scripture:'<span class="vnum">21</span>이제는 율법 외에 하나님의 한 의가 나타났으니 율법과 선지자들에게 증거를 받은 것이라 <span class="vnum">22</span>곧 예수 그리스도를 믿음으로 말미암아 모든 믿는 자에게 미치는 하나님의 의니 차별이 없느니라 <span class="vnum">23</span>모든 사람이 죄를 범하였으매 하나님의 영광에 이르지 못하더니 <span class="vnum">24</span>그리스도 예수 안에 있는 속량으로 말미암아 하나님의 은혜로 값 없이 의롭다 하심을 얻은 자 되었느니라 <span class="vnum">25</span>이 예수를 하나님이 그의 피로써 믿음으로 말미암는 화목제물로 세우셨으니 이는 하나님께서 길이 참으시는 중에 전에 지은 죄를 간과하심으로 자기의 의로우심을 나타내려 하심이니 <span class="vnum">26</span>곧 이 때에 자기의 의로우심을 나타내사 자기도 의로우시며 또한 예수 믿는 자를 의롭다 하려 하심이라',
    meditation:'로마서에서 제일 빛나는 부분 중 하나예요. 아무리 노력해도 안 됐던 걸, 하나님이 그냥 \'값없이\' 주셨어요 — 예수님을 통해서요. 이건 마치 시험 점수를 못 받았는데 선생님이 "괜찮아, 만점 줄게" 하시는 것과 비슷해요. 심지어 공짜라고 대충 주신 게 아니라, 십자가라는 엄청난 값을 치르고 주신 거예요.',
    application:'내가 이미 공짜로 받은 걸 다시 노력으로 얻으려고 하고 있지는 않나요? 오늘은 그냥 감사하게 받아볼까요.',
    prayer:'하나님, 제 힘으로 얻을 수 없던 걸 예수님을 통해 값없이 주셔서 감사해요. 이 은혜를 의지하며 오늘을 살게 해주세요. 예수님 이름으로 기도합니다. 아멘.',},
  {n:15, date:"08.15", ref:"3:27&ndash;31", theme:"자랑할 게 없어져요", ready:true,
    scripture:'<span class="vnum">27</span>그런즉 자랑할 데가 어디냐 있을 수가 없느니라 무슨 법으로냐 행위로냐 아니라 오직 믿음의 법으로니라 <span class="vnum">28</span>그러므로 사람이 의롭다 하심을 얻는 것은 율법의 행위에 있지 않고 믿음으로 되는 줄 우리가 인정하노라 <span class="vnum">29</span>하나님은 다만 유대인의 하나님이시냐 또한 이방인의 하나님은 아니시냐 진실로 이방인의 하나님도 되시느니라 <span class="vnum">30</span>할례자도 믿음으로 말미암아 또한 무할례자도 믿음으로 말미암아 의롭다 하실 하나님은 한 분이시니라 <span class="vnum">31</span>그런즉 우리가 믿음으로 말미암아 율법을 파기하느냐 그럴 수 없느니라 도리어 율법을 굳게 세우느니라',
    meditation:'믿음으로 얻는 거라면, 사실 자랑할 게 하나도 없어져요. 시험을 잘 봐서 얻은 게 아니라 그냥 받은 거니까요. 그런데 바울은 여기서 반전을 던져요 — 그렇다면 규칙은 필요 없는 걸까요? 아니요, 오히려 믿음이 규칙이 진짜 말하려던 걸 완성시킨다는 거예요.',
    application:'내 신앙 안에 은근히 자랑하고 싶은 부분이 있나요? 오늘은 자랑 대신 감사로 바꿔볼까요.',
    prayer:'하나님, 제게는 자랑할 게 없고 믿음으로 설 뿐이라는 걸 고백합니다. 겸손하게 오늘을 살게 해주세요. 예수님 이름으로 기도합니다. 아멘.',},
  {n:16, date:"08.16", ref:"4:1&ndash;8", theme:"아브라함도 그냥 믿었을 뿐이에요", ready:true,
    scripture:'<span class="vnum">1</span>그런즉 육신으로 우리 조상인 아브라함이 무엇을 얻었다 하리요 <span class="vnum">2</span>만일 아브라함이 행위로써 의롭다 하심을 받았으면 자랑할 것이 있으려니와 하나님 앞에서는 없느니라 <span class="vnum">3</span>성경이 무엇을 말하느냐 아브라함이 하나님을 믿으매 그것이 그에게 의로 여겨진 바 되었느니라 <span class="vnum">4</span>일하는 자에게는 그 삯이 은혜로 여겨지지 아니하고 보수로 여겨지거니와 <span class="vnum">5</span>일을 아니할지라도 경건하지 아니한 자를 의롭다 하시는 이를 믿는 자에게는 그의 믿음을 의로 여기시나니 <span class="vnum">6</span>일한 것이 없이 하나님께 의로 여기심을 받는 사람의 복에 대하여 다윗이 말한 바 <span class="vnum">7</span>불법이 사함을 받고 죄가 가리어짐을 받는 사람들은 복이 있고 <span class="vnum">8</span>주께서 그 죄를 인정하지 아니하실 사람은 복이 있도다 함과 같으니라',
    meditation:'아브라함은 뭔가 대단한 걸 해서 인정받은 게 아니라, 그냥 하나님을 믿었을 뿐이에요. 다윗도 마찬가지예요 — 자기 공로가 아니라 죄가 용서받는 은혜를 노래했어요. 두 사람 다 자기 성취가 아니라 하나님의 은혜를 붙잡았던 거예요.',
    application:'내가 하나님 앞에서 내세우고 싶은 \'내 공로\'가 있나요? 오늘은 그냥 아브라함처럼 믿는 자로 서볼까요.',
    prayer:'하나님, 제 행위가 아니라 믿음으로 인정해주셔서 감사해요. 저도 아브라함처럼 그냥 믿는 사람이 되고 싶어요. 예수님 이름으로 기도합니다. 아멘.',},
  {n:17, date:"08.17", ref:"4:9&ndash;16", theme:"순서가 중요해요", ready:true,
    scripture:'<span class="vnum">9</span>그런즉 이 복이 할례자에게냐 혹은 무할례자에게도냐 무릇 우리가 말하기를 아브라함에게는 그 믿음이 의로 여겨졌다 하노라 <span class="vnum">10</span>그런즉 그것이 어떻게 여겨졌느냐 할례시냐 무할례시냐 할례시가 아니요 무할례시니라 <span class="vnum">11</span>그가 할례의 표를 받은 것은 무할례시에 믿음으로 된 의를 인친 것이니 이는 무할례자로서 믿는 모든 자의 조상이 되어 그들도 의로 여기심을 얻게 하려 하심이라 <span class="vnum">12</span>또한 할례자의 조상이 되었나니 곧 할례 받을 자에게뿐 아니라 우리 조상 아브라함이 무할례시에 가졌던 믿음의 자취를 따르는 자들에게도 그러하니라 <span class="vnum">13</span>아브라함이나 그 후손에게 세상의 상속자가 되리라고 하신 언약은 율법으로 말미암은 것이 아니요 오직 믿음의 의로 말미암은 것이니라 <span class="vnum">14</span>만일 율법에 속한 자들이 상속자이면 믿음은 헛것이 되고 약속은 파기되었느니라 <span class="vnum">15</span>율법은 진노를 이루게 하나니 율법이 없는 곳에는 범법도 없느니라 <span class="vnum">16</span>그러므로 상속자가 되는 그것이 은혜에 속하기 위하여 믿음으로 되나니 이는 그 약속을 그 모든 후손에게 굳게 하려 하심이라 율법에 속한 자에게뿐만 아니라 아브라함의 믿음에 속한 자에게도 그러하니 아브라함은 우리 모든 사람의 조상이라',
    meditation:'아브라함이 의롭다고 인정받은 건 할례(표시)를 받기 전이었어요. 즉, 표시가 그를 특별하게 만든 게 아니라 이미 있던 믿음을 나중에 확인해준 것뿐이에요. 그래서 아브라함은 표시와 상관없이 믿는 모든 사람의 \'조상\'이 될 수 있었어요.',
    application:'내가 신앙의 자격으로 삼고 있는 조건들(교회 다닌 기간, 세례 여부 등)이 믿음보다 앞서 있지는 않나요? 오늘은 조건 없이 그냥 믿어볼까요.',
    prayer:'하나님, 어떤 조건보다 먼저 믿음으로 저를 받아주셔서 감사해요. 예수님 이름으로 기도합니다. 아멘.',},
  {n:18, date:"08.18", ref:"4:17&ndash;21", theme:"불가능해 보여도", ready:true,
    scripture:'<span class="vnum">17</span>기록된 바 내가 너를 많은 민족의 조상으로 세웠다 하심과 같으니 그가 믿은 바 하나님은 죽은 자를 살리시며 없는 것을 있는 것으로 부르시는 이시니라 <span class="vnum">18</span>아브라함이 바랄 수 없는 중에 바라고 믿었으니 이는 네 후손이 이같으리라 하신 말씀대로 많은 민족의 조상이 되게 하려 하심이라 <span class="vnum">19</span>그가 백 세나 되어 자기 몸이 죽은 것 같고 사라의 태가 죽은 것 같음을 알고도 믿음이 약하여지지 아니하고 <span class="vnum">20</span>믿음이 없어 하나님의 약속을 의심하지 않고 믿음으로 견고하여져서 하나님께 영광을 돌리며 <span class="vnum">21</span>약속하신 그것을 또한 능히 이루실 줄을 확신하였으니',
    meditation:'백 살 넘은 아브라함, 아이를 못 낳는 사라 — 인간적으로는 완전 불가능한 상황이었어요. 그런데 아브라함은 그 상황이 아니라 \'죽은 자도 살리시는\' 하나님을 바라봤어요. 믿음이란 상황을 부정하는 게 아니라, 상황보다 크신 하나님을 보는 거예요.',
    application:'지금 내 삶에 \'이건 진짜 안 될 것 같은데\' 싶은 게 있나요? 오늘은 그 상황이 아니라 하나님을 바라보는 연습을 해볼까요.',
    prayer:'하나님, 불가능해 보이는 상황 속에서도 하나님을 신뢰하게 해주세요. 예수님 이름으로 기도합니다. 아멘.',},
  {n:19, date:"08.19", ref:"4:22&ndash;25", theme:"이거 다 나를 위한 거였어요", ready:true,
    scripture:'<span class="vnum">22</span>그러므로 그것이 그에게 의로 여겨졌느니라 <span class="vnum">23</span>그에게 의로 여겨졌다 기록된 것은 아브라함만 위한 것이 아니요 <span class="vnum">24</span>의로 여기심을 받을 우리도 위함이니 곧 예수 우리 주를 죽은 자 가운데서 살리신 이를 믿는 자니라 <span class="vnum">25</span>예수는 우리가 범죄한 것 때문에 내줌이 되고 또한 우리를 의롭다 하시기 위하여 살아나셨느니라',
    meditation:'아브라함 얘기가 그냥 옛날 이야기가 아니라, 지금 우리를 위해서도 기록된 거라고 바울은 말해요. 예수님의 죽으심과 부활, 이 두 가지 사건이 다른 누구도 아닌 \'나\'를 위한 사건이었다는 거예요.',
    application:'예수님의 십자가와 부활이 나를 위한 사건이었다는 걸 오늘 구체적으로 떠올려볼까요.',
    prayer:'하나님, 예수님의 죽으심과 부활이 저를 위한 것이었음을 감사해요. 이 믿음으로 오늘을 담대히 살게 해주세요. 예수님 이름으로 기도합니다. 아멘.',},
  {n:20, date:"08.20", ref:"5:1&ndash;5", theme:"이제 진짜 평안해져요", ready:true,
    scripture:'<span class="vnum">1</span>그러므로 우리가 믿음으로 의롭다 하심을 받았으니 우리 주 예수 그리스도로 말미암아 하나님과 화평을 누리자 <span class="vnum">2</span>또한 그로 말미암아 우리가 믿음으로 서 있는 이 은혜에 들어감을 얻었으며 하나님의 영광을 바라고 즐거워하느니라 <span class="vnum">3</span>다만 이뿐 아니라 우리가 환난 중에도 즐거워하나니 이는 환난은 인내를, <span class="vnum">4</span>인내는 연단을, 연단은 소망을 이루는 줄 앎이로다 <span class="vnum">5</span>소망이 우리를 부끄럽게 하지 아니함은 우리에게 주신 성령으로 말미암아 하나님의 사랑이 우리 마음에 부은 바 됨이니',
    meditation:'믿음으로 하나님과의 관계가 회복되면, 첫 번째로 오는 게 \'평강\'이에요. 심지어 힘든 일이 생겨도 그게 헛되지 않다는 거예요 — 어려움이 인내를, 인내가 성숙을, 성숙이 소망을 만들어낸다는 거죠. 시험공부처럼 힘들지만 결국 성장으로 이어지는 과정 같은 거예요.',
    application:'지금 겪고 있는 힘든 일이 있나요? 그걸 낭비되는 시간이 아니라 성장의 과정으로 봐볼까요.',
    prayer:'하나님, 힘든 순간에도 소망을 잃지 않게 해주세요. 성령의 사랑을 오늘 새롭게 느끼게 해주세요. 예수님 이름으로 기도합니다. 아멘.',},
  {n:21, date:"08.21", ref:"5:6&ndash;11", theme:"자격 없을 때 먼저 사랑하셨어요", ready:true,
    scripture:'<span class="vnum">6</span>우리가 아직 연약할 때에 기약대로 그리스도께서 경건하지 않은 자를 위하여 죽으셨도다 <span class="vnum">7</span>의인을 위하여 죽는 자가 쉽지 않고 선인을 위하여 용감히 죽는 자가 혹 있거니와 <span class="vnum">8</span>우리가 아직 죄인 되었을 때에 그리스도께서 우리를 위하여 죽으심으로 하나님께서 우리에 대한 자기의 사랑을 확증하셨느니라 <span class="vnum">9</span>그러면 이제 우리가 그의 피로 말미암아 의롭다 하심을 받았으니 더욱 그로 말미암아 진노하심에서 구원을 받을 것이니 <span class="vnum">10</span>곧 우리가 원수 되었을 때에 그의 아들의 죽으심으로 말미암아 하나님과 화목하게 되었은즉 화목하게 된 자로서는 더욱 그의 살아나심으로 말미암아 구원을 받을 것이니라 <span class="vnum">11</span>그뿐 아니라 이제 우리로 화목하게 하신 우리 주 예수 그리스도로 말미암아 하나님 안에서 또한 즐거워하느니라',
    meditation:'보통 사람은 좋은 사람을 위해서만 희생하려고 하잖아요. 그런데 예수님은 우리가 아직 죄인이었을 때, 심지어 원수였을 때 먼저 죽으셨어요. 이게 진짜 사랑의 증거예요 — 내가 자격을 갖췄기 때문이 아니라, 조건 없이 먼저 사랑받은 거예요.',
    application:'내가 하나님과 제일 멀다고 느꼈던 순간에도 예수님은 이미 나를 위해 죽으셨다는 걸 오늘 기억해볼까요.',
    prayer:'하나님, 제가 자격 없을 때도 먼저 사랑해주셔서 감사해요. 그 사랑을 의지하며 오늘을 살게 해주세요. 예수님 이름으로 기도합니다. 아멘.',},
  {n:22, date:"08.22", ref:"5:12&ndash;17", theme:"아담과 예수님, 두 사람 이야기", ready:true,
    scripture:'<span class="vnum">12</span>그러므로 한 사람으로 말미암아 죄가 세상에 들어오고 죄로 말미암아 사망이 들어왔나니 이와 같이 모든 사람이 죄를 지었으므로 사망이 모든 사람에게 이르렀느니라 <span class="vnum">13</span>죄가 율법 있기 전에도 세상에 있었으나 율법이 없었을 때에는 죄를 죄로 여기지 아니하였느니라 <span class="vnum">14</span>그러나 아담으로부터 모세까지 아담의 범죄와 같은 죄를 짓지 아니한 자들까지도 사망이 왕 노릇 하였나니 아담은 오실 자의 모형이라 <span class="vnum">15</span>그러나 이 은사는 그 범죄와 같지 아니하니 곧 한 사람의 범죄를 인하여 많은 사람이 죽었은즉 더욱 하나님의 은혜와 또한 한 사람 예수 그리스도의 은혜로 말미암은 선물은 많은 사람에게 넘쳤느니라 <span class="vnum">16</span>또 이 선물은 범죄한 한 사람으로 말미암은 것과 같지 아니하니 심판은 한 사람으로 말미암아 정죄에 이르렀으나 은사는 많은 범죄로 말미암아 의롭다 하심에 이름이니라 <span class="vnum">17</span>한 사람의 범죄로 말미암아 사망이 그 한 사람을 통하여 왕 노릇 하였은즉 더욱 은혜와 의의 선물을 넘치게 받는 자들은 한 분 예수 그리스도를 통하여 생명 안에서 왕 노릇 하리로다',
    meditation:'바울은 인류 역사를 두 사람으로 나눠서 설명해요 — 아담과 예수님. 아담 한 사람 때문에 죄와 죽음이 모든 사람에게 퍼졌지만, 예수님 한 분 때문에 넘치는 은혜와 생명이 주어졌어요. 중요한 건 내가 지금 어느 쪽에 속해 있는지예요 — 정죄의 자리가 아니라 생명의 자리라는 거죠.',
    application:'내가 아직도 죄책감에 머물러 있는 부분이 있나요? 오늘은 생명의 자리로 옮겨가볼까요.',
    prayer:'하나님, 아담 안에서 정죄받았던 저를 예수님 안에서 생명으로 옮겨주셔서 감사해요. 예수님 이름으로 기도합니다. 아멘.',},
  {n:23, date:"08.23", ref:"5:18&ndash;21", theme:"죄보다 은혜가 더 커요", ready:true,
    scripture:'<span class="vnum">18</span>그런즉 한 범죄로 많은 사람이 정죄에 이른 것 같이 한 의로운 행위로 말미암아 많은 사람이 의롭다 하심을 받아 생명에 이르렀느니라 <span class="vnum">19</span>한 사람이 순종하지 아니함으로 많은 사람이 죄인 된 것 같이 한 사람이 순종하심으로 많은 사람이 의인이 되리라 <span class="vnum">20</span>율법이 들어온 것은 범죄를 더하게 하려 함이라 그러나 죄가 더한 곳에 은혜가 더욱 넘쳤나니 <span class="vnum">21</span>이는 죄가 사망 안에서 왕 노릇 한 것 같이 은혜도 또한 의로 말미암아 왕 노릇 하여 우리 주 예수 그리스도로 말미암아 영생에 이르게 하려 함이라',
    meditation:'이건 정말 담대한 선언이에요 — "죄가 더한 곳에 은혜가 더욱 넘쳤나니." 내 죄가 아무리 심각해 보여도, 그걸 덮는 하나님의 은혜가 훨씬 더 크다는 거예요. 마치 아무리 큰 얼룩도 지울 수 있는 강력한 세제 같은 느낌이랄까요.',
    application:'내 잘못이 너무 크게 느껴져서 자책하고 있는 게 있나요? 오늘은 그 죄보다 큰 은혜를 떠올려볼까요.',
    prayer:'하나님, 제 죄가 아무리 깊어도 하나님의 은혜가 더 넘친다는 걸 믿어요. 이 은혜 안에서 담대히 살게 해주세요. 예수님 이름으로 기도합니다. 아멘.',},
  {n:24, date:"08.24", ref:"6:1&ndash;7", theme:"세례는 그냥 물에 젖는 게 아니에요", ready:true,
    scripture:'<span class="vnum">1</span>그런즉 우리가 무슨 말을 하리요 은혜를 더하게 하려고 죄에 거하겠느냐 <span class="vnum">2</span>그럴 수 없느니라 죄에 대하여 죽은 우리가 어찌 그 가운데 더 살리요 <span class="vnum">3</span>무릇 그리스도 예수와 합하여 세례를 받은 우리는 그의 죽으심과 합하여 세례를 받은 줄을 알지 못하느냐 <span class="vnum">4</span>그러므로 우리가 그의 죽으심과 합하여 세례를 받음으로 그와 함께 장사되었나니 이는 아버지의 영광으로 말미암아 그리스도를 죽은 자 가운데서 살리심과 같이 우리로 또한 새 생명 가운데서 행하게 하려 함이라 <span class="vnum">5</span>만일 우리가 그의 죽으심과 같은 모양으로 연합한 자가 되었으면 또한 그의 부활과 같은 모양으로 연합한 자도 되리라 <span class="vnum">6</span>우리가 알거니와 우리의 옛 사람이 예수와 함께 십자가에 못 박힌 것은 죄의 몸이 죽어 다시는 우리가 죄에게 종 노릇 하지 아니하려 함이니 <span class="vnum">7</span>이는 죽은 자가 죄에서 벗어나 의롭다 하심을 얻었음이라',
    meditation:'"은혜가 넘치니까 죄를 더 지어도 되는 거 아닐까요?" 바울은 단호하게 아니라고 해요. 세례는 그리스도와 함께 옛날의 나를 \'장사지내는\' 사건이에요. 옛 사람은 죽었고, 이제는 새 생명으로 사는 거죠 — 마치 레벨업 하고 나면 예전 스탯으로 돌아갈 수 없는 것처럼요.',
    application:'내 삶에서 아직 \'옛날 나\'처럼 반응하는 부분이 있나요? 오늘은 새로운 나로 그 상황을 대해볼까요.',
    prayer:'하나님, 그리스도와 함께 죽고 새롭게 살아난 사람임을 기억하게 해주세요. 예수님 이름으로 기도합니다. 아멘.',},
  {n:25, date:"08.25", ref:"6:8&ndash;14", theme:"그렇게 여기라는 명령", ready:true,
    scripture:'<span class="vnum">8</span>만일 우리가 그리스도와 함께 죽었으면 또한 그와 함께 살 줄을 믿노니 <span class="vnum">9</span>이는 그리스도께서 죽은 자 가운데서 살아나셨으매 다시 죽지 아니하시고 사망이 다시 그를 주장하지 못할 줄을 앎이로라 <span class="vnum">10</span>그가 죽으심은 죄에 대하여 단번에 죽으심이요 그가 살아 계심은 하나님께 대하여 살아 계심이니 <span class="vnum">11</span>이와 같이 너희도 너희 자신을 죄에 대하여는 죽은 자요 그리스도 예수 안에서 하나님께 대하여는 살아 있는 자로 여길지어다 <span class="vnum">12</span>그러므로 너희는 죄가 너희 죽을 몸을 지배하지 못하게 하여 몸의 사욕에 순종하지 말고 <span class="vnum">13</span>또한 너희 지체를 불의의 무기로 죄에게 내주지 말고 오직 너희 자신을 죽은 자 가운데서 다시 살아난 자 같이 하나님께 드리며 너희 지체를 의의 무기로 하나님께 드리라 <span class="vnum">14</span>죄가 너희를 주장하지 못하리니 이는 너희가 법 아래에 있지 아니하고 은혜 아래에 있음이라',
    meditation:'그리스도는 죄에 대해 완전히 죽으셨고, 이제는 하나님께 대해 살아 계세요. 바울은 우리도 우리 자신을 그렇게 \'여기라\'고 말해요 — 이건 감정이 아니라 결심이에요. 죄가 나를 지배 못하는 이유는 내가 법 아래가 아니라 은혜 아래 있기 때문이에요.',
    application:'오늘 내 시간이나 말을 하나님께 \'의의 도구\'로 드릴 수 있는 순간 하나를 정해볼까요.',
    prayer:'하나님, 저를 죄에 대해 죽고 하나님께 살아있는 사람으로 여기게 해주세요. 예수님 이름으로 기도합니다. 아멘.',},
  {n:26, date:"08.26", ref:"6:15&ndash;19", theme:"자유란 뭘 섬기냐의 문제예요", ready:true,
    scripture:'<span class="vnum">15</span>그런즉 어찌하리요 우리가 법 아래에 있지 아니하고 은혜 아래에 있으니 죄를 지으리요 그럴 수 없느니라 <span class="vnum">16</span>너희 자신을 종으로 내주어 누구에게 순종하든지 그 순종함을 받는 자의 종이 되는 줄을 너희가 알지 못하느냐 혹은 죄의 종으로 사망에 이르고 혹은 순종의 종으로 의에 이르느니라 <span class="vnum">17</span>하나님께 감사하리로다 너희가 본래 죄의 종이더니 너희에게 전하여 준 바 교훈의 본을 마음으로 순종하여 <span class="vnum">18</span>죄로부터 해방되어 의에게 종이 되었느니라 <span class="vnum">19</span>너희 육신이 연약하므로 내가 사람의 예대로 말하노니 전에 너희가 너희 지체를 부정과 불법에 내주어 불법에 이른 것 같이 이제는 너희 지체를 의에게 종으로 내주어 거룩함에 이르라',
    meditation:'누구든 순종하는 대상의 종이 된다고 바울은 말해요. 완전한 자유란 없어요 — 문제는 \'무엇을\' 섬기느냐예요. 전에는 죄의 종이었지만, 이제는 마음으로 순종해서 의의 종이 됐다는 거죠.',
    application:'내가 요즘 무의식적으로 순종하고 있는 게 뭔가요? 그게 옛 습관인지, 좋은 방향인지 점검해볼까요.',
    prayer:'하나님, 제가 마음으로부터 하나님께 순종하는 사람이 되게 해주세요. 예수님 이름으로 기도합니다. 아멘.',},
  {n:27, date:"08.27", ref:"6:20&ndash;23", theme:"삯이랑 선물의 차이", ready:true,
    scripture:'<span class="vnum">20</span>너희가 죄의 종이 되었을 때에는 의에 대하여 자유로웠느니라 <span class="vnum">21</span>너희가 그 때에 무슨 열매를 얻었느냐 이제는 너희가 그 일을 부끄러워하나니 이는 그 마지막이 사망임이라 <span class="vnum">22</span>그러나 이제는 너희가 죄로부터 해방되고 하나님께 종이 되어 거룩함에 이르는 열매를 맺었으니 그 마지막은 영생이라 <span class="vnum">23</span>죄의 삯은 사망이요 하나님의 은사는 그리스도 예수 우리 주 안에 있는 영생이니라',
    meditation:'로마서에서 제일 유명한 구절 중 하나예요 — "죄의 삯은 사망이요 하나님의 은사는 영생이니라." 삯은 내가 일한 만큼 받는 거고, 선물(은사)은 그냥 받는 거예요. 우리가 마땅히 받아야 할 건 사망인데, 하나님은 대신 영생을 선물로 주셨어요.',
    application:'오늘 내가 맺고 있는 삶의 열매가 부끄러운 쪽인지, 떳떳한 쪽인지 정직하게 점검해볼까요.',
    prayer:'하나님, 제가 받아야 마땅한 게 아니라 값없이 주신 영생의 선물을 받았음을 감사해요. 예수님 이름으로 기도합니다. 아멘.',},
  {n:28, date:"08.28", ref:"7:1&ndash;6", theme:"규칙에서 관계로", ready:true,
    scripture:'<span class="vnum">1</span>형제들아 내가 법 아는 자들에게 말하노니 너희는 그 법이 사람이 살 동안만 그를 주관하는 줄 알지 못하느냐 <span class="vnum">2</span>남편 있는 여인이 그 남편 생전에는 법으로 그에게 매인 바 되나 만일 그 남편이 죽으면 남편의 법에서 벗어나느니라 <span class="vnum">3</span>그러므로 만일 그 남편 생전에 다른 남자에게 가면 음녀라 그러나 만일 남편이 죽으면 그 법에서 자유롭게 되나니 다른 남자에게 갈지라도 음녀가 되지 아니하느니라 <span class="vnum">4</span>그러므로 내 형제들아 너희도 그리스도의 몸으로 말미암아 율법에 대하여 죽임을 당하였으니 이는 다른 이 곧 죽은 자 가운데서 살아나신 이에게 가서 우리가 하나님을 위하여 열매를 맺게 하려 함이라 <span class="vnum">5</span>우리가 육신에 있을 때에는 율법으로 말미암는 죄의 정욕이 우리 지체 중에 역사하여 우리로 사망을 위하여 열매를 맺게 하였더니 <span class="vnum">6</span>이제는 우리가 얽매였던 것에 대하여 죽었으므로 율법에서 벗어났으니 이러므로 우리가 영의 새로운 것으로 섬길 것이요 율법 조문의 묵은 것으로 아니할지니라',
    meditation:'바울은 결혼을 비유로 들어요 — 남편이 죽으면 아내는 그 법에서 자유로워지듯, 우리도 그리스도의 몸을 통해 옛 규칙에서 벗어났어요. 이제는 낡은 규칙이 아니라 살아있는 관계로 하나님을 섬기는 거예요.',
    application:'내 신앙생활이 그냥 \'규칙 지키기\'처럼 굳어있지는 않나요? 오늘은 관계로서 하나님을 만나볼까요.',
    prayer:'하나님, 저를 낡은 규칙이 아니라 살아있는 관계로 하나님을 섬기게 해주세요. 예수님 이름으로 기도합니다. 아멘.',},
  {n:29, date:"08.29", ref:"7:7&ndash;13", theme:"규칙 자체가 문제는 아니에요", ready:true,
    scripture:'<span class="vnum">7</span>그런즉 우리가 무슨 말을 하리요 율법이 죄냐 그럴 수 없느니라 율법으로 말미암지 않고는 내가 죄를 알지 못하였으니 곧 율법이 탐내지 말라 하지 아니하였더라면 내가 탐심을 알지 못하였으리라 <span class="vnum">8</span>그러나 죄가 기회를 타서 계명으로 말미암아 내 속에서 온갖 탐심을 이루었나니 이는 율법이 없으면 죄가 죽은 것임이라 <span class="vnum">9</span>전에 율법을 깨닫지 못했을 때에는 내가 살았더니 계명이 이르매 죄는 살아나고 나는 죽었도다 <span class="vnum">10</span>생명에 이르게 할 그 계명이 내게 대하여 도리어 사망에 이르게 하는 것이 되었도다 <span class="vnum">11</span>죄가 기회를 타서 계명으로 말미암아 나를 속이고 그것으로 나를 죽였는지라 <span class="vnum">12</span>이로 보건대 율법은 거룩하고 계명도 거룩하고 의로우며 선하도다 <span class="vnum">13</span>그런즉 선한 것이 내게 사망이 되었느냐 그럴 수 없느니라 오직 죄가 죄로 드러나기 위하여 선한 그것으로 말미암아 나를 죽게 만들었으니 이는 계명으로 말미암아 죄로 심히 죄 되게 하려 함이라',
    meditation:'그럼 규칙(율법) 자체가 죄일까요? 바울은 아니라고 해요. 오히려 규칙이 있어서 탐심이 뭔지 알게 됐다는 거예요. 문제는 규칙이 아니라, 그 규칙을 틈타 온갖 욕심을 부리는 내 안의 죄예요.',
    application:'규칙이나 상황을 탓하기보다, 그 안에서 기회를 노리는 내 욕심을 오늘 정직하게 들여다볼까요.',
    prayer:'하나님, 규칙은 선하지만 제 안의 죄가 문제임을 고백해요. 저를 더 깊이 깨닫고 하나님께 나아가게 해주세요. 예수님 이름으로 기도합니다. 아멘.',},
  {n:30, date:"08.30", ref:"7:14&ndash;20", theme:"저도 이런 적 있어요", ready:true,
    scripture:'<span class="vnum">14</span>우리가 율법은 신령한 줄 알거니와 나는 육신에 속하여 죄 아래에 팔렸도다 <span class="vnum">15</span>내가 행하는 것을 내가 알지 못하노니 곧 내가 원하는 것은 행하지 아니하고 도리어 미워하는 것을 행함이라 <span class="vnum">16</span>만일 내가 원하지 아니하는 그것을 행하면 내가 이로써 율법이 선한 것을 시인하노니 <span class="vnum">17</span>이제는 그것을 행하는 자가 내가 아니요 내 속에 거하는 죄니라 <span class="vnum">18</span>내 속 곧 내 육신에 선한 것이 거하지 아니하는 줄을 아노니 원함은 내게 있으나 선을 행하는 것은 없노라 <span class="vnum">19</span>내가 원하는 바 선은 행하지 아니하고 도리어 원하지 아니하는 바 악을 행하는도다 <span class="vnum">20</span>만일 내가 원하지 아니하는 그것을 하면 이를 행하는 자는 내가 아니요 내 속에 거하는 죄니라',
    meditation:'바울의 이 고백은 정말 공감돼요 — 원하는 선은 안 하고, 원하지 않는 나쁜 건 하게 되는 것. 다이어트 하겠다고 하고 야식 먹는 것과 비슷한 느낌이랄까요(물론 훨씬 더 깊은 얘기지만요). 이건 신앙 실패의 변명이 아니라, 내 힘만으로는 완벽할 수 없다는 정직한 고백이에요.',
    application:'오늘 내 안에서 원하는 것과 실제 행동이 어긋나는 부분이 있다면, 숨기지 말고 하나님께 솔직하게 말씀드려볼까요.',
    prayer:'하나님, 원하는 선을 행하지 못하는 제 연약함을 아룁니다. 제 힘이 아니라 하나님의 은혜로 이기게 해주세요. 예수님 이름으로 기도합니다. 아멘.',},
  {n:31, date:"08.31", ref:"7:21&ndash;25", theme:"곤고하지만 감사할 수 있어요", ready:true,
    scripture:'<span class="vnum">21</span>그러므로 내가 한 법을 깨달았노니 곧 선을 행하기 원하는 나에게 악이 함께 있는 것이로다 <span class="vnum">22</span>내 속사람으로는 하나님의 법을 즐거워하되 <span class="vnum">23</span>내 지체 속에서 한 다른 법이 내 마음의 법과 싸워 내 지체 속에 있는 죄의 법으로 나를 사로잡는 것을 보는도다 <span class="vnum">24</span>오호라 나는 곤고한 사람이로다 이 사망의 몸에서 누가 나를 건져내랴 <span class="vnum">25</span>우리 주 예수 그리스도로 말미암아 하나님께 감사하리로다 그런즉 내 자신이 마음으로는 하나님의 법을 육신으로는 죄의 법을 섬기노라',
    meditation:'7장의 절정이에요. 선을 행하고 싶은데 그 안에 악이 함께 있다는 걸 깨달은 바울은 "나는 곤고한 사람이로다"라고 탄식해요. 그런데 바로 다음에 답이 나와요 — 예수 그리스도를 통해 하나님께 감사할 수 있다는 거예요. 이 긴장은 다음 장(8장)에서 성령의 능력으로 풀려나갈 거예요.',
    application:'내 힘으로 해결 못하는 부분을 붙잡고 씨름하고 있다면, 오늘은 그 짐을 예수님께 맡기고 먼저 감사해볼까요.',
    prayer:'하나님, 저는 스스로 구원할 수 없는 사람이에요. 그러나 예수 그리스도로 인해 감사할 수 있음을 고백합니다. 8월 한 달 묵상을 하나님께 올려드려요. 예수님 이름으로 기도합니다. 아멘.',},
];

function getWeekdayLabel(n) {
  const labels = ['주일','월','화','수','목','금','토'];
  const d = new Date(2026, 7, n);
  return labels[d.getDay()];
}

function buildTOC() {
  const list = document.getElementById('toc-list');
  list.innerHTML = days.map(d => `
    <li>
      <button class="toc-item ${d.ready ? '' : 'is-disabled'}" onclick="${d.ready ? `openDay(${d.n})` : 'return false'}">
        <span class="toc-date-num">${d.date}<span class="toc-dow">(${getWeekdayLabel(d.n)})</span></span>
        <span class="toc-ref">롬 ${d.ref}</span>
        <span class="toc-theme-text">${d.theme}</span>
        ${d.ready ? '<span class="toc-tag">보기</span>' : '<span class="toc-tag soon">준비중</span>'}
        <span class="toc-arrow">${d.ready ? '›' : ''}</span>
      </button>
    </li>
  `).join('');
}

function openDay(n) {
  const d = days.find(x => x.n === n);
  if (!d || !d.ready) return;
  stopSpeech();
  currentDay = d;
  document.getElementById('d-num').textContent = String(d.n).padStart(2,'0');
  document.getElementById('d-date').textContent = `8월 ${d.n}일 · 로마서 ${d.ref.replace(/&ndash;/,'-')}`;
  document.getElementById('d-theme').textContent = d.theme;
  document.getElementById('d-body').innerHTML = `
    <div class="scripture-box">${d.scripture}</div>
    <div class="section-block"><span class="chip chip--med">묵상</span><div class="section-text">${d.meditation}</div></div>
    <div class="section-block"><span class="chip chip--app">적용</span><div class="section-text">${d.application}</div></div>
    <div class="section-block"><span class="chip chip--pray">기도</span><div class="section-text">${d.prayer}</div></div>
  `;
  const next = days.find(x => x.n === n+1);
  document.getElementById('d-nav-next').textContent = next ? `${n+1}일차 (${next.ready ? '보기' : '준비중'})` : '마지막 날이에요';
  document.getElementById('view-cover').style.display = 'none';
  document.getElementById('view-day').style.display = 'block';
  window.scrollTo(0,0);
}

function showCover() {
  stopSpeech();
  document.getElementById('view-day').style.display = 'none';
  document.getElementById('view-cover').style.display = 'block';
  window.scrollTo(0,0);
}

/* TTS (음질 우선 고정) */
let currentDay=null, currentUtterance=null, currentRate=1, isSpeaking=false, koVoiceCache=null;
function pickBestKoreanVoice() {
  if (koVoiceCache) return koVoiceCache;
  const voices = window.speechSynthesis ? window.speechSynthesis.getVoices() : [];
  const ko = voices.filter(v => v.lang==='ko-KR'||v.lang==='ko_KR'||v.lang==='ko');
  if (!ko.length) return null;
  const ranked = ko.slice().sort((a,b)=>{
    const isHQ = v => /neural|premium|enhanced|natural|yuna|sora|online|google/i.test(v.name);
    const score = v => (isHQ(v)?3:0) + (!v.localService?2:0);
    return score(b)-score(a);
  });
  koVoiceCache = ranked[0];
  return koVoiceCache;
}
if (window.speechSynthesis) window.speechSynthesis.onvoiceschanged = () => { koVoiceCache = null; };

function getSpeechText(d) {
  const tmp = document.createElement('div');
  tmp.innerHTML = d.scripture.replace(/<span class="vnum">\d+<\/span>/g,' ');
  const s = tmp.textContent.replace(/\s+/g,' ').trim();
  return `${s}. 묵상. ${d.meditation} 적용. ${d.application} 기도. ${d.prayer}`;
}
function updateAudioUI() {
  const icon = document.getElementById('audio-play-icon');
  const status = document.getElementById('audio-status');
  if (!icon) return;
  if (isSpeaking) { icon.textContent='❚❚'; status.textContent='듣는 중 · '+currentRate+'x'; }
  else { icon.textContent='▶'; status.textContent='듣기'; }
}
function speakFromStart() {
  if (!currentDay || !window.speechSynthesis) return;
  window.speechSynthesis.cancel();
  const utter = new SpeechSynthesisUtterance(getSpeechText(currentDay));
  utter.lang='ko-KR'; utter.rate=currentRate;
  const v = pickBestKoreanVoice(); if (v) utter.voice=v;
  utter.onend=()=>{isSpeaking=false;updateAudioUI();};
  utter.onerror=()=>{isSpeaking=false;updateAudioUI();};
  currentUtterance=utter;
  window.speechSynthesis.speak(utter);
  isSpeaking=true; updateAudioUI();
}
function togglePlay() {
  if (!window.speechSynthesis) { alert('이 브라우저는 음성 읽기를 지원하지 않습니다.'); return; }
  if (isSpeaking && window.speechSynthesis.speaking && !window.speechSynthesis.paused) { window.speechSynthesis.pause(); isSpeaking=false; updateAudioUI(); return; }
  if (window.speechSynthesis.paused) { window.speechSynthesis.resume(); isSpeaking=true; updateAudioUI(); return; }
  speakFromStart();
}
function stopSpeech() { if (window.speechSynthesis) window.speechSynthesis.cancel(); isSpeaking=false; currentUtterance=null; }
function setRate(r) {
  currentRate=r;
  document.querySelectorAll('.speed-btn').forEach(b=>b.classList.toggle('is-active', parseFloat(b.dataset.rate)===r));
  if (isSpeaking || (window.speechSynthesis && window.speechSynthesis.speaking)) speakFromStart();
  updateAudioUI();
}

/* 글씨 크기 */
function setFontScale(scale) {
  document.documentElement.style.setProperty('--fs-scale', scale);
  document.querySelectorAll('.fs-btn').forEach(b=>b.classList.toggle('fs-active', parseFloat(b.dataset.scale)===scale));
  try { localStorage.setItem('fsScaleYouth', String(scale)); } catch(e) {}
}
(function initFontScale(){
  let s=null; try { s=localStorage.getItem('fsScaleYouth'); } catch(e) {}
  if (s) {
    document.documentElement.style.setProperty('--fs-scale', s);
    window.addEventListener('DOMContentLoaded', ()=>{
      document.querySelectorAll('.fs-btn').forEach(b=>b.classList.toggle('fs-active', parseFloat(b.dataset.scale)===parseFloat(s)));
    });
  }
})();

/* 맨 위로 */
function scrollToTop(){ window.scrollTo({top:0, behavior:'smooth'}); }
(function initScrollTop(){
  const btn=document.getElementById('scroll-top-btn');
  if(!btn) return;
  window.addEventListener('scroll', ()=>{
    if (window.scrollY>400) btn.classList.add('is-visible'); else btn.classList.remove('is-visible');
  });
})();

buildTOC();
if ('serviceWorker' in navigator) {
  window.addEventListener('load', ()=>{ navigator.serviceWorker.register('../../sw.js').catch(()=>{}); });
}
</script>
